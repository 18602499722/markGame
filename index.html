<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公主与王子跑酷障碍挑战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            padding: 10px;
        }

        .game-container {
            position: relative;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 100%;
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8C8 50%, #90EE90 100%);
            max-width: 100%;
            height: auto;
        }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            opacity: 1;
            transition: opacity 0.3s;
        }

        .game-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .title {
            font-size: 32px;
            color: #FFD700;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            text-align: center;
            padding: 0 20px;
        }

        .subtitle {
            font-size: 18px;
            color: #FFF;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
        }

        .start-btn {
            padding: 15px 50px;
            font-size: 20px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: none;
            border-radius: 50px;
            color: #333;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            touch-action: manipulation;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.6);
        }

        .instructions {
            margin-top: 30px;
            color: #DDD;
            font-size: 14px;
            text-align: center;
            padding: 0 20px;
        }

        .instructions p {
            margin: 5px 0;
        }

        .score-display {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 22px;
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            font-weight: bold;
        }

        .best-score {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 20px;
            color: #FF6B6B;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            font-weight: bold;
        }

        .game-over-text {
            font-size: 40px;
            color: #FF6B6B;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 24px;
            color: #FFF;
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .control-btn {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
            transition: transform 0.1s;
        }

        .control-btn:active {
            transform: scale(0.9);
        }

        .control-btn.small {
            width: 60px;
            height: 60px;
            font-size: 24px;
        }

        .control-btn.red {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
        }

        .control-btn.blue {
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
        }

        .control-btn.orange {
            background: linear-gradient(135deg, #FF9800 0%, #F57C00 100%);
        }

        .control-btn.green {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
        }

        @media (max-width: 768px) {
            .title {
                font-size: 24px;
            }
            .subtitle {
                font-size: 16px;
            }
            .score-display {
                font-size: 18px;
            }
            .game-over-text {
                font-size: 32px;
            }
            .final-score {
                font-size: 20px;
            }
            .control-btn {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
            .control-btn.small {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="900" height="500"></canvas>
        <div class="score-display" id="scoreDisplay">分数: 0</div>
        <div class="best-score" id="bestScore">最高分: 0</div>

        <div class="game-overlay" id="startScreen">
            <h1 class="title">🏰 公主与王子跑酷障碍挑战 🏰</h1>
            <p class="subtitle">帮助勇敢的王子躲避障碍，拯救公主！</p>
            <button class="start-btn" id="startBtn">开始游戏</button>
            <div class="instructions">
                <p>💻 电脑：使用 <strong>↑ ↓ ← →</strong> 方向键</p>
                <p>📱 手机：使用下方的控制按钮</p>
                <p>⏫ 空格键/上键/绿色按钮 = 蓄力跳跃（按得越久跳得越高！）</p>
                <p>⏬ 下键/红色按钮 = 下滑</p>
                <p>⬅️ 左键/蓝色按钮 = 向左移动</p>
                <p>➡️ 右键/蓝色按钮 = 向右移动</p>
                <p>💡 躲避河流和水坑，坚持越久分数越高！</p>
            </div>
        </div>

        <div class="game-overlay hidden" id="gameOverScreen">
            <h1 class="game-over-text">💔 游戏结束 💔</h1>
            <p class="final-score" id="finalScore">最终分数: 0</p>
            <button class="start-btn" id="restartBtn">再玩一次</button>
        </div>
    </div>

    <div class="controls" id="controls">
        <button class="control-btn blue small" id="btnLeft">←</button>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button class="control-btn green" id="btnUp">↑</button>
            <button class="control-btn red" id="btnDown">↓</button>
        </div>
        <button class="control-btn blue small" id="btnRight">→</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const finalScoreEl = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        const GAME_WIDTH = canvas.width;
        const GAME_HEIGHT = canvas.height;
        const GROUND_Y = GAME_HEIGHT - 100;
        const LANE_HEIGHT = 80;

        let gameRunning = false;
        let score = 0;
        let bestScore = localStorage.getItem('princeRunnerBestScore') || 0;
        let gameSpeed = 5;
        let animationId;
        let obstacles = [];
        let lastObstacleTime = 0;

        const prince = {
            x: 150,
            originalX: 150,
            y: GROUND_Y - 80,
            width: 50,
            height: 80,
            velocityY: 0,
            velocityX: 0,
            isJumping: false,
            isSliding: false,
            isChargingJump: false,
            jumpChargeTime: 0,
            jumpVelocity: 0,
            gravity: 0.45,
            maxJumpHeight: 200,
            maxChargeTime: 45,
            minJumpPower: 12,
            maxJumpPower: 28,
            slideTimer: 0,
            moveSpeed: 8
        };

        const princess = {
            x: 50,
            y: GROUND_Y - 160,
            width: 100,
            height: 160,
            bobOffset: 0,
            bobDirection: 1,
            image: null
        };

        const princessImage = new Image();
        princessImage.src = 'gz.jpg';
        princessImage.onload = function() {
            princess.image = princessImage;
            console.log('公主图片加载成功:', princessImage.width, 'x', princessImage.height);
        };
        princessImage.onerror = function() {
            console.error('公主图片加载失败');
        };

        const keys = {
            Space: false,
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false
        };

        class Obstacle {
            constructor(type) {
                this.type = type;
                this.x = GAME_WIDTH + 50;
                this.width = type === 'river' ? 120 : 80;
                this.height = type === 'river' ? 35 : 60;
                
                this.y = GROUND_Y - this.height - 5;
                
                if (type === 'puddle') {
                    this.x = GAME_WIDTH + 50 + Math.random() * 200;
                }
            }

            update() {
                this.x -= gameSpeed;
            }

            draw() {
                if (this.type === 'river') {
                    this.drawRiver();
                } else {
                    this.drawPuddle();
                }
            }

            drawRiver() {
                ctx.fillStyle = '#3498db';
                ctx.fillRect(this.x, this.y, this.width, this.height);

                ctx.fillStyle = '#5dade2';
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.moveTo(this.x + i * 40, this.y);
                    ctx.quadraticCurveTo(
                        this.x + i * 40 + 20, this.y + this.height / 2,
                        this.x + i * 40, this.y + this.height
                    );
                    ctx.stroke();
                }

                ctx.fillStyle = '#85c1e9';
                ctx.fillRect(this.x, this.y, this.width, 5);
            }

            drawPuddle() {
                ctx.fillStyle = '#3498db';
                ctx.beginPath();
                ctx.ellipse(
                    this.x + this.width / 2,
                    this.y + this.height / 2,
                    this.width / 2,
                    this.height / 3,
                    0, 0, Math.PI * 2
                );
                ctx.fill();

                ctx.fillStyle = '#5dade2';
                ctx.beginPath();
                ctx.ellipse(
                    this.x + this.width / 2 - 10,
                    this.y + this.height / 2 - 5,
                    this.width / 4,
                    this.height / 6,
                    0, 0, Math.PI * 2
                );
                ctx.fill();
            }

            isOffScreen() {
                return this.x + this.width < 0;
            }
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(0.5, '#98D8C8');
            gradient.addColorStop(1, '#90EE90');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, GROUND_Y, GAME_WIDTH, GAME_HEIGHT - GROUND_Y);

            ctx.fillStyle = '#2E7D32';
            for (let i = 0; i < GAME_WIDTH; i += 30) {
                ctx.beginPath();
                ctx.moveTo(i, GROUND_Y);
                ctx.lineTo(i + 15, GROUND_Y - 20);
                ctx.lineTo(i + 30, GROUND_Y);
                ctx.fill();
            }

            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 8;
            for (let i = 0; i < GAME_WIDTH; i += 100) {
                ctx.beginPath();
                ctx.moveTo(i, GROUND_Y);
                ctx.lineTo(i, GROUND_Y + 20);
                ctx.stroke();
            }

            for (let i = 0; i < 5; i++) {
                drawCloud(100 + i * 200, 50 + Math.sin(Date.now() / 2000 + i) * 10);
            }
        }

        function drawCloud(x, y) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.beginPath();
            ctx.arc(x, y, 30, 0, Math.PI * 2);
            ctx.arc(x + 25, y - 10, 25, 0, Math.PI * 2);
            ctx.arc(x + 50, y, 30, 0, Math.PI * 2);
            ctx.arc(x + 25, y + 5, 20, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawPrincess() {
            const bobY = princess.y + Math.sin(Date.now() / 300) * 3;

            if (princess.image) {
                ctx.drawImage(princess.image, princess.x, bobY, princess.width, princess.height);
            } else {
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(princess.x + princess.width / 2, bobY - princess.height + 15, princess.width / 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#FFE4B5';
                ctx.fillRect(princess.x + princess.width / 5, bobY - princess.height + 30, princess.width * 3 / 5, princess.height / 2);

                ctx.fillStyle = '#FFD700';
                ctx.fillRect(princess.x + princess.width / 6, bobY - princess.height / 3, princess.width * 4 / 6, princess.height / 2.5);

                ctx.fillStyle = '#FF69B4';
                ctx.beginPath();
                ctx.moveTo(princess.x, bobY - princess.height / 3);
                ctx.lineTo(princess.x - princess.width / 3, bobY + princess.height / 6);
                ctx.lineTo(princess.x + princess.width / 5, bobY + princess.height / 6);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = '#FF69B4';
                ctx.beginPath();
                ctx.moveTo(princess.x + princess.width, bobY - princess.height / 3);
                ctx.lineTo(princess.x + princess.width + princess.width / 3, bobY + princess.height / 6);
                ctx.lineTo(princess.x + princess.width - princess.width / 5, bobY + princess.height / 6);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(princess.x + princess.width / 3, bobY - princess.height + 20, 3, 0, Math.PI * 2);
                ctx.arc(princess.x + princess.width * 2 / 3, bobY - princess.height + 20, 3, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#FF69B4';
                ctx.beginPath();
                ctx.moveTo(princess.x + princess.width * 3 / 4, bobY - princess.height + 25);
                ctx.lineTo(princess.x + princess.width, bobY - princess.height + 22);
                ctx.lineTo(princess.x + princess.width * 3 / 4, bobY - princess.height + 18);
                ctx.closePath();
                ctx.fill();
            }
        }

        function drawPrince() {
            let princeY = prince.y;

            if (prince.isSliding) {
                princeY = GROUND_Y - 40;
            }

            ctx.fillStyle = '#8B0000';
            ctx.beginPath();
            ctx.arc(prince.x + prince.width / 2, princeY - 65, 18, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#FFE4C4';
            ctx.fillRect(prince.x + 10, princeY - 47, prince.width - 20, 35);

            ctx.fillStyle = '#4169E1';
            const bodyHeight = prince.isSliding ? 25 : 55;
            ctx.fillRect(prince.x + 8, princeY - 12, prince.width - 16, bodyHeight);

            ctx.fillStyle = '#4169E1';
            if (prince.isSliding) {
                ctx.fillRect(prince.x - 10, princeY - 5, 20, 15);
                ctx.fillRect(prince.x + prince.width - 10, princeY - 5, 20, 15);
            } else {
                ctx.fillRect(prince.x + 5, princeY - 5, 15, 40);
                ctx.fillRect(prince.x + prince.width - 20, princeY - 5, 15, 40);
            }

            ctx.fillStyle = '#654321';
            ctx.fillRect(prince.x + prince.width / 2 - 5, princeY - 80, 10, 20);

            ctx.fillStyle = '#C0C0C0';
            ctx.beginPath();
            ctx.moveTo(prince.x + prince.width / 2, princeY - 85);
            ctx.lineTo(prince.x + prince.width / 2 - 15, princeY - 100);
            ctx.lineTo(prince.x + prince.width / 2 + 15, princeY - 100);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(prince.x + 17, princeY - 52, 3, 0, Math.PI * 2);
            ctx.arc(prince.x + 33, princeY - 52, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(prince.x + 25, princeY - 42, 8, 0, Math.PI);
            ctx.stroke();

            if (prince.isSliding) {
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(prince.x + 5, princeY + 5, 8, 0, Math.PI * 2);
                ctx.fill();
            }

            if (prince.isChargingJump) {
                const chargeRatio = prince.jumpChargeTime / prince.maxChargeTime;
                ctx.fillStyle = `rgba(255, 215, 0, ${0.3 + chargeRatio * 0.5})`;
                ctx.beginPath();
                ctx.arc(prince.x + prince.width / 2, princeY - 40, 30 + chargeRatio * 20, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(prince.x + prince.width / 2, princeY - 40, 25 + chargeRatio * 15, -Math.PI / 2, -Math.PI / 2 + chargeRatio * Math.PI * 2);
                ctx.stroke();
            }
        }

        function drawLanes() {
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.lineWidth = 2;

            for (let i = 1; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(0, GROUND_Y - LANE_HEIGHT * i);
                ctx.lineTo(GAME_WIDTH, GROUND_Y - LANE_HEIGHT * i);
                ctx.stroke();
            }
        }

        function updatePrince() {
            if (!gameRunning) return;
            
            const jumpKeyPressed = keys.Space || keys.ArrowUp;
            
            if (jumpKeyPressed && !prince.isJumping && !prince.isSliding && !prince.isChargingJump) {
                prince.isChargingJump = true;
                prince.jumpChargeTime = 0;
            }

            if (prince.isChargingJump && jumpKeyPressed) {
                prince.jumpChargeTime++;
                if (prince.jumpChargeTime >= prince.maxChargeTime) {
                    prince.jumpChargeTime = prince.maxChargeTime;
                }
            }

            if (prince.isChargingJump && !jumpKeyPressed) {
                const chargeRatio = prince.jumpChargeTime / prince.maxChargeTime;
                const jumpPower = prince.minJumpPower + chargeRatio * (prince.maxJumpPower - prince.minJumpPower);
                prince.isJumping = true;
                prince.jumpVelocity = -jumpPower;
                prince.isChargingJump = false;
                prince.jumpChargeTime = 0;
            }

            if (keys.ArrowDown && !prince.isJumping && !prince.isSliding) {
                prince.isSliding = true;
                prince.slideTimer = 30;
            }

            if (prince.isJumping) {
                prince.jumpVelocity += prince.gravity;
                prince.y += prince.jumpVelocity;

                if (prince.y >= GROUND_Y - 80) {
                    prince.y = GROUND_Y - 80;
                    prince.isJumping = false;
                    prince.jumpVelocity = 0;
                }
            }

            if (prince.isSliding) {
                prince.slideTimer--;
                if (prince.slideTimer <= 0) {
                    prince.isSliding = false;
                }
            }

            if (keys.ArrowLeft) {
                prince.x -= prince.moveSpeed;
            }
            if (keys.ArrowRight) {
                prince.x += prince.moveSpeed;
            }

            prince.x = Math.max(20, Math.min(prince.x, GAME_WIDTH - prince.width - 20));
        }

        function spawnObstacle() {
            const now = Date.now();
            if (now - lastObstacleTime > 1500 - gameSpeed * 50) {
                const type = Math.random() > 0.3 ? 'river' : 'puddle';
                obstacles.push(new Obstacle(type));
                lastObstacleTime = now;
            }
        }

        function checkCollision() {
            if (prince.isJumping) {
                const jumpHeight = (GROUND_Y - 80) - prince.y;
                if (jumpHeight > 40) {
                    return false;
                }
            }

            const princeHitbox = {
                x: prince.x + 10,
                y: prince.y,
                width: prince.width - 20,
                height: prince.isSliding ? 40 : prince.height - 20
            };

            if (prince.isSliding) {
                princeHitbox.y = GROUND_Y - 40;
            } else if (!prince.isJumping) {
                princeHitbox.y = prince.y;
            } else {
                princeHitbox.y = GROUND_Y - prince.height;
            }

            for (const obstacle of obstacles) {
                if (
                    princeHitbox.x < obstacle.x + obstacle.width &&
                    princeHitbox.x + princeHitbox.width > obstacle.x &&
                    princeHitbox.y < obstacle.y + obstacle.height &&
                    princeHitbox.y + princeHitbox.height > obstacle.y
                ) {
                    return true;
                }
            }
            return false;
        }

        function updateGame() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            drawBackground();
            drawLanes();

            spawnObstacle();

            obstacles = obstacles.filter(obs => !obs.isOffScreen());
            obstacles.forEach(obs => {
                obs.update();
                obs.draw();
            });

            updatePrince();
            drawPrincess();
            drawPrince();

            if (checkCollision()) {
                gameOver();
                return;
            }

            score++;
            scoreDisplay.textContent = `分数: ${score}`;

            if (score % 500 === 0 && gameSpeed < 12) {
                gameSpeed += 0.5;
            }

            animationId = requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (!gameRunning) return;
            updateGame();
        }

        function startGame() {
            gameRunning = true;
            score = 0;
            gameSpeed = 5;
            obstacles = [];
            prince.isJumping = false;
            prince.isSliding = false;
            prince.isChargingJump = false;
            prince.jumpChargeTime = 0;
            prince.jumpVelocity = 0;
            prince.velocityX = 0;
            prince.x = prince.originalX;
            prince.y = GROUND_Y - 80;
            lastObstacleTime = 0;
            bestScore = localStorage.getItem('princeRunnerBestScore') || 0;
            document.getElementById('bestScore').textContent = `最高分: ${bestScore}`;

            Object.keys(keys).forEach(key => keys[key] = false);

            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            scoreDisplay.textContent = '分数: 0';

            gameLoop();
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('princeRunnerBestScore', bestScore);
                document.getElementById('bestScore').textContent = `最高分: ${bestScore}`;
                finalScoreEl.textContent = `🎉 新纪录！最终分数: ${score}`;
            } else {
                finalScoreEl.textContent = `最终分数: ${score}`;
            }
            
            gameOverScreen.classList.remove('hidden');
        }

        document.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) {
                keys[e.key] = true;
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) {
                keys[e.key] = false;
                e.preventDefault();
            }
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        const btnUp = document.getElementById('btnUp');
        const btnDown = document.getElementById('btnDown');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');

        function addTouchControl(btn, key) {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                keys[key] = true;
            }, { passive: false });
            
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys[key] = false;
            }, { passive: false });

            btn.addEventListener('mousedown', () => {
                keys[key] = true;
            });

            btn.addEventListener('mouseup', () => {
                keys[key] = false;
            });

            btn.addEventListener('mouseleave', () => {
                keys[key] = false;
            });
        }

        addTouchControl(btnUp, 'Space');
        addTouchControl(btnDown, 'ArrowDown');
        addTouchControl(btnLeft, 'ArrowLeft');
        addTouchControl(btnRight, 'ArrowRight');

        document.getElementById('bestScore').textContent = `最高分: ${bestScore}`;

        drawBackground();
        drawLanes();
        drawPrincess();
        drawPrince();
    </script>
</body>
</html>
